framework: autorag
objective_metric: answer_correctness
objectives:
  context_recall: 0.35
  context_precision: 0.25
  answer_correctness: 0.25
  citation_accuracy: 0.15
yaml_template:
  version: 1
  optimization:
    strategy: bayesian
    trials: 6
  node_lines:
  - name: retrieval_line
    nodes:
    - kind: retrieval
      name: vector
      params:
        top_k: 8
    - kind: reranker
      name: bge-reranker
      params:
        enabled: true
    - kind: chunking
      name: semantic_chunker
      params:
        chunk_size: 512
        chunk_overlap: 128
  postprocess:
    context_ordering: section_then_score
search_parameters:
  chunk_size: 512
  chunk_overlap: 128
  retriever: vector
  reranker: bge-reranker
  top_k: 8
  context_ordering: section_then_score
