framework: dspy
optimizer: MIPROv2
objective_metric: answer_correctness
objectives:
  faithfulness: 0.35
  response_relevancy: 0.2
  answer_correctness: 0.25
  citation_accuracy: 0.2
program_contract:
  input_fields:
  - question
  - contexts
  output_fields:
  - answer
  - citations
  expected_tunable_parts:
  - instructions
  - fewshot_demos
  - citation_formatting
  - decomposition
search_parameters:
  optimizer: MIPROv2
  fewshot_count: 6
  prompt_style: claim_then_evidence
  temperature: 0.2
  max_citations: 2
  decomposition: false
compile_hints:
  bayesian_optimizer: true
  fewshot_enabled: true
  decomposition: false
