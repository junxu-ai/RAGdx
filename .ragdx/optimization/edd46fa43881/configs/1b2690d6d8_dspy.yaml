framework: dspy
optimizer: GEPA
objective_metric: answer_correctness
objectives:
  faithfulness: 0.35
  response_relevancy: 0.2
  answer_correctness: 0.25
  citation_accuracy: 0.2
program_contract:
  input_fields:
  - question
  - contexts
  output_fields:
  - answer
  - citations
  expected_tunable_parts:
  - instructions
  - fewshot_demos
  - citation_formatting
  - decomposition
search_parameters:
  optimizer: GEPA
  fewshot_count: 4
  prompt_style: grounded_qa
  temperature: 0.0
  max_citations: 1
  decomposition: false
compile_hints:
  bayesian_optimizer: false
  fewshot_enabled: true
  decomposition: false
